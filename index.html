<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Browse and rate Borderland Dreams 2026 — community art projects and experiences" />
    <title>Marbled Dragon Dinner</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🐉</text></svg>" />
    <link rel="preconnect" href="https://res.cloudinary.com" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Atkinson+Hyperlegible+Next:wght@400;700&display=swap" />
    <link rel="stylesheet" href="css/style.css" />
    <script type="module" src="js/script.js"></script>
  </head>

  <body class="rating-unrated rating-1 rating-2 rating-3">
    <header>
      <h1><a href="/" style="text-decoration:none;color:inherit">Marbled Dragon Dinner</a></h1>
      <p><a href="https://dreams.theborderland.se/borderland/dreams-2026" target="_blank">Borderland Dreams 2026</a> &mdash; <span id="dream-count"></span></p>
      <p id="dream-stats"></p>
    </header>

    <nav>
      <input type="search" id="search-bar" placeholder="Search dreams..." />
      <select id="sort-buckets">
        <option value="random">Random</option>
        <optgroup label="General">
          <option value="name-asc">Name A–Z</option>
          <option value="name-desc">Name Z–A</option>
          <option value="rating-desc">Rating high–low</option>
          <option value="rating-asc">Rating low–high</option>
          <option value="comments-desc">Most comments</option>
          <option value="comments-asc">Least comments</option>
        </optgroup>
        <optgroup label="Budget">
          <option value="requested-desc">Most requested</option>
          <option value="requested-asc">Least requested</option>
          <option value="selffunded-desc">Most self-funded</option>
          <option value="selffunded-asc">Least self-funded</option>
          <option value="budget-min-desc">Biggest total budget</option>
          <option value="budget-min-asc">Smallest total budget</option>
        </optgroup>
        <optgroup label="Funding">
          <option value="fund-percent-desc">Most funded %</option>
          <option value="fund-percent-asc">Least funded %</option>
          <option value="funders-desc">Most funders</option>
          <option value="funders-asc">Least funders</option>
        </optgroup>
      </select>

      <fieldset class="rating-filter">
        <legend>Filter by rating</legend>
        <label><input type="checkbox" checked class="rating-checkbox" data-rating="unrated" /> Unrated</label>
        <label><input type="checkbox" checked class="rating-checkbox" data-rating="1" /> 1&#9733;</label>
        <label><input type="checkbox" checked class="rating-checkbox" data-rating="2" /> 2&#9733;</label>
        <label><input type="checkbox" checked class="rating-checkbox" data-rating="3" /> 3&#9733;</label>
      </fieldset>

      <div id="tag-filter" class="tag-cloud"></div>
    </nav>

    <p class="loading">Loading...</p>

    <main>
      <section id="buckets-list"></section>
      <aside id="detail-panel"></aside>
    </main>
  </body>
</html>
